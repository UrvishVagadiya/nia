<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>NIA Surat — Chapter Landing</title>

    <style>
      /* NIA Surat — shared styles for all pages */

      :root {
        --brand: #2e9ddb;
        --brand-2: #1b6fa8;
        --brand-deep: #0e3a5c;
        --brand-soft: #e8f2f9;
        --brand-band: #1b6fa8;
        --gold: #f5b43e;

        --ink: #0e1620;
        --ink-2: #2a3340;
        --ink-3: #5a6472;
        --ink-4: #8b95a4;
        --paper: #ffffff;
        --paper-2: #f6f8fb;
        --paper-3: #ecf1f6;
        --line: #e2e7ee;
        --line-2: #c8d1dd;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family:
          system-ui,
          -apple-system,
          "Helvetica Neue",
          Arial,
          sans-serif;
        font-size: 16px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      img {
        max-width: 100%;
        display: block;
      }
      a {
        color: inherit;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }

      .serif {
        font-family:
          system-ui,
          -apple-system,
          "Helvetica Neue",
          Arial,
          sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .serif-it {
        font-family:
          system-ui,
          -apple-system,
          "Helvetica Neue",
          Arial,
          sans-serif;
        font-style: italic;
        font-weight: 600;
      }
      .reset-btn {
        background: none;
        border: 0;
        padding: 0;
        color: inherit;
      }

      @media (max-width: 980px) {
        .hero-grid {
          grid-template-columns: 1fr !important;
          gap: 40px !important;
        }
        .stat-band-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .why-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .steps-grid {
          grid-template-columns: 1fr !important;
          gap: 32px !important;
        }
        .pricing-grid {
          grid-template-columns: 1fr !important;
        }
        .blog-grid {
          grid-template-columns: 1fr !important;
        }
        .members-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }
        .leader-grid {
          grid-template-columns: 1fr !important;
          gap: 32px !important;
        }
        .schedule-grid {
          grid-template-columns: 1fr !important;
        }
        .faq-grid {
          grid-template-columns: 1fr !important;
          gap: 32px !important;
        }
        .apply-grid {
          grid-template-columns: 1fr !important;
          gap: 40px !important;
        }
        .footer-grid {
          grid-template-columns: 1fr 1fr !important;
          gap: 32px !important;
        }
        .post-grid {
          grid-template-columns: 1fr !important;
          gap: 32px !important;
        }
      }
      @media (max-width: 640px) {
        .nav-link-d {
          display: none !important;
        }
        .chapter-switcher-d {
          display: none !important;
        }
        .chapter-switcher-m {
          display: flex !important;
        }
        .nav-cta-d {
          display: none !important;
        }
        .why-grid {
          grid-template-columns: 1fr !important;
        }
        .stat-band-grid {
          grid-template-columns: 1fr !important;
        }
        .members-grid {
          grid-template-columns: 1fr !important;
        }
        .footer-grid {
          grid-template-columns: 1fr !important;
        }
        .filter-row {
          overflow-x: auto;
          flex-wrap: nowrap !important;
          padding-bottom: 4px;
          -webkit-overflow-scrolling: touch;
        }
        .filter-row::-webkit-scrollbar {
          display: none;
        }
      }
    </style>
